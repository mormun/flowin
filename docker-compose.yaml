services:

  # Base de datos PostgreSQL
  postgres:
    image: postgres:17-alpine
    container_name: flowin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización: crea tablas y datos seed al primer arranque
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aplicación Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowin-app
    restart: unless-stopped
    # Esperar a que PostgreSQL esté listo antes de arrancar
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_URL:        ${NEXTAUTH_URL}
      NEXTAUTH_SECRET:     ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID:    ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "3000:3000"
    volumes:
      # Persistencia de archivos subidos por usuarios
      - uploads_data:/app/public/uploads
      # Volúmenes para hot reload en desarrollo
      - ./src:/app/src
      - ./public:/app/public
      - ./next.config.ts:/app/next.config.ts

volumes:
  postgres_data:   # Datos de PostgreSQL
  uploads_data:    # Archivos adjuntos de tickets