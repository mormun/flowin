services:
  postgres:
    image: postgres:17-alpine
    container_name: flowin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowin}
      POSTGRES_DB: ${POSTGRES_DB:-flowindb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-flowin -d ${POSTGRES_DB:-flowindb}}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowin-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flowin}:${POSTGRES_PASSWORD:-flowin}@postgres:5432/${POSTGRES_DB:-flowindb}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads
      - ./src:/app/src
      - ./public:/app/public
      - ./next.config.ts:/app/next.config.ts

volumes:
  postgres_data:
  uploads_data:
